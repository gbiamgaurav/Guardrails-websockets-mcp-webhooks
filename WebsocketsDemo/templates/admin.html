<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - User Tracking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #333;
        }
        
        .status-badge {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .badge-active {
            background: #10b981;
            color: white;
        }
        
        .badge-info {
            background: #3b82f6;
            color: white;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 1200px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .active-users-list {
            list-style: none;
        }
        
        .active-users-list li {
            padding: 10px;
            background: #f0f9ff;
            margin-bottom: 8px;
            border-radius: 5px;
            border-left: 4px solid #10b981;
            display: flex;
            align-items: center;
        }
        
        .active-users-list li::before {
            content: "●";
            color: #10b981;
            margin-right: 10px;
            font-size: 18px;
        }
        
        .inactive-users-list li {
            padding: 10px;
            background: #f9fafb;
            margin-bottom: 8px;
            border-radius: 5px;
            border-left: 4px solid #6b7280;
            display: flex;
            align-items: center;
            color: #666;
        }
        
        .inactive-users-list li::before {
            content: "○";
            color: #6b7280;
            margin-right: 10px;
            font-size: 18px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-card .label {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .user-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        .user-table th {
            background: #f3f4f6;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e5e7eb;
        }
        
        .user-table td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .user-table tr:hover {
            background: #f9fafb;
        }
        
        .online-badge {
            display: inline-block;
            padding: 4px 12px;
            background: #d1fae5;
            color: #065f46;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .offline-badge {
            display: inline-block;
            padding: 4px 12px;
            background: #f3f4f6;
            color: #4b5563;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .update-time {
            color: #999;
            font-size: 12px;
            margin-top: 10px;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s ease;
        }
        
        .refresh-btn:hover {
            background: #764ba2;
        }
        
        .activity-log {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .activity-item {
            padding: 10px;
            border-left: 3px solid #667eea;
            margin-bottom: 10px;
            background: #f9fafb;
            border-radius: 4px;
            font-size: 13px;
        }
        
        .activity-time {
            color: #666;
            font-size: 11px;
        }
        
        .activity-event-join {
            color: #10b981;
            font-weight: 600;
        }
        
        .activity-event-disconnect {
            color: #ef4444;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>👨‍💼 Admin Portal</h1>
                <p>User Activity & Connection Tracking</p>
            </div>
            <button class="refresh-btn" onclick="refreshData()">🔄 Refresh</button>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="number" id="total-users">0</div>
                <div class="label">Total Users</div>
            </div>
            <div class="stat-card">
                <div class="number" id="active-users">0</div>
                <div class="label">Currently Online</div>
            </div>
            <div class="stat-card">
                <div class="number" id="inactive-users">0</div>
                <div class="label">Offline Users</div>
            </div>
        </div>
        
        <div class="grid">
            <div class="card">
                <h2>🟢 Active Users (Online Now)</h2>
                <ul class="active-users-list" id="active-list">
                    <li>Loading...</li>
                </ul>
                <div class="update-time" id="active-time"></div>
            </div>
            
            <div class="card">
                <h2>⚪ All Registered Users</h2>
                <div id="all-users-container">
                    <table class="user-table" id="user-table">
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Status</th>
                                <th>Messages</th>
                                <th>Last Activity</th>
                            </tr>
                        </thead>
                        <tbody id="user-tbody">
                            <tr><td colspan="4">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="update-time" id="all-users-time"></div>
            </div>
        </div>
        
        <div class="grid">
            <div class="card" style="grid-column: 1 / -1;">
                <h2>📊 User Activity History</h2>
                <div class="activity-log" id="activity-log">
                    <p>Loading activity history...</p>
                </div>
                <div class="update-time" id="activity-time"></div>
            </div>
        </div>
    </div>
    
    <script>
        // Auto-refresh every 3 seconds
        setInterval(refreshData, 3000);
        
        // Initial load
        refreshData();
        
        async function refreshData() {
            try {
                // Fetch active users
                const activeRes = await fetch('/api/users/active');
                const activeData = await activeRes.json();
                updateActiveUsers(activeData);
                
                // Fetch all users
                const allRes = await fetch('/api/users/all');
                const allData = await allRes.json();
                updateAllUsers(allData);
                
                // Fetch activity history
                const historyRes = await fetch('/api/users/history');
                const historyData = await historyRes.json();
                updateActivityLog(historyData);
                
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }
        
        function updateActiveUsers(data) {
            const list = document.getElementById('active-list');
            if (data.active_users.length === 0) {
                list.innerHTML = '<li style="border-left: 4px solid #f97316;">No users online</li>';
            } else {
                list.innerHTML = data.active_users.map(user => `<li>${user}</li>`).join('');
            }
            document.getElementById('active-time').textContent = `Updated: ${new Date(data.timestamp).toLocaleTimeString()}`;
            document.getElementById('active-users').textContent = data.active_count;
        }
        
        function updateAllUsers(data) {
            document.getElementById('total-users').textContent = data.total_users;
            document.getElementById('inactive-users').textContent = data.inactive_users;
            
            const tbody = document.getElementById('user-tbody');
            tbody.innerHTML = data.users.map(user => `
                <tr>
                    <td><strong>${user.username}</strong></td>
                    <td>
                        ${user.is_online 
                            ? '<span class="online-badge">🟢 Online</span>' 
                            : '<span class="offline-badge">⚪ Offline</span>'}
                    </td>
                    <td>${user.message_count}</td>
                    <td><small>${user.last_activity ? new Date(user.last_activity).toLocaleString() : 'Never'}</small></td>
                </tr>
            `).join('');
            
            document.getElementById('all-users-time').textContent = `Updated: ${new Date(data.timestamp).toLocaleTimeString()}`;
        }
        
        function updateActivityLog(data) {
            const log = document.getElementById('activity-log');
            if (data.history.length === 0) {
                log.innerHTML = '<p style="color: #999;">No activity yet</p>';
            } else {
                log.innerHTML = data.history.reverse().slice(0, 50).map(activity => {
                    const time = new Date(activity.timestamp).toLocaleTimeString();
                    const eventClass = activity.event_type === 'join' ? 'activity-event-join' : 'activity-event-disconnect';
                    const icon = activity.event_type === 'join' ? '✅ Joined' : '👋 Left';
                    return `
                        <div class="activity-item">
                            <div><span class="${eventClass}">${icon}</span> - <strong>${activity.username}</strong></div>
                            <div class="activity-time">${time}</div>
                        </div>
                    `;
                }).join('');
            }
            document.getElementById('activity-time').textContent = `Updated: ${new Date(data.timestamp).toLocaleTimeString()}`;
        }
    </script>
</body>
</html>
